const generateShareUrl = (json) => {
  try {
    const compressed = btoa(unescape(encodeURIComponent(JSON.stringify(json))));
    return window.location.origin + window.location.pathname + "#" + compressed;
  } catch(e) { return null; }
};

const parseShareUrl = () => {
  try {
    const hash = window.location.hash.slice(1);
    if (!hash) return null;
    return JSON.parse(decodeURIComponent(escape(atob(hash))));
  } catch(e) { return null; }
};

// MAIN APP
// ═══════════════════════════════════════════════════════════════
function DynamicFormBuilder() {
  const [activeTab, setActiveTab] = useState("builder");
  const [sections, setSections] = useState([{ Id: "main", Title: "FORM", Order: 1 }]);
  const [fields, setFields] = useState([]);
  const [editingField, setEditingField] = useState(null);
  const [activeSection, setActiveSection] = useState("main");
  const [toast, setToast] = useState(null);
  const [customTemplates, setCustomTemplates] = useState(loadCustomTemplates);
  const [showSaveTemplate, setShowSaveTemplate] = useState(false);
  const [newTemplateName, setNewTemplateName] = useState("");
  const [shareUrl, setShareUrl] = useState(null);
  const [qrPayload, setQrPayload] = useState(null);
  const [qrMode, setQrMode] = useState(null); // "blob" or "compressed"
  const [showQR, setShowQR] = useState(false);
  const [qrLoading, setQrLoading] = useState(false);
  const [dragIdx, setDragIdx] = useState(null);
  const [jsonText, setJsonText] = useState("");
  const [jsonError, setJsonError] = useState(null);
  const jsonDb = useRef(null);
  const fileRef = useRef(null);

  useEffect(() => { const s = parseShareUrl(); if (s) { if (s.Sections) setSections(s.Sections); if (s.FormFields) setFields(s.FormFields); showToastMsg("Paylaşılan form yüklendi!"); } }, []);
  useEffect(() => { if (activeTab === "json") { setJsonText(JSON.stringify({ Sections: sections, FormFields: fields }, null, 2)); setJsonError(null); } }, [activeTab]);

  const showToastMsg = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); };
  const buildJson = () => ({ Sections: sections, FormFields: fields });

  // JSON auto-sync
  const handleJsonEdit = (text) => {
    setJsonText(text);
    if (jsonDb.current) clearTimeout(jsonDb.current);
    jsonDb.current = setTimeout(() => { try { const p = JSON.parse(text); if (p.Sections) setSections(p.Sections); if (p.FormFields) setFields(p.FormFields); setJsonError(null); } catch (e) { setJsonError(e.message); } }, 800);
  };

  // File upload
  const handleFileUpload = (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    const r = new FileReader();
    r.onload = (ev) => { try { const raw = JSON.parse(ev.target.result); const c = extractFormData(raw); if (c.Sections) setSections(c.Sections); if (c.FormFields) setFields(c.FormFields.sort((a, b) => (a.Order ?? 0) - (b.Order ?? 0))); setActiveTab("builder"); setActiveSection(c.Sections?.[0]?.Id || "main"); showToastMsg("JSON yüklendi! (__type temizlendi)"); } catch { showToastMsg("Hata: Geçersiz JSON"); } };
    r.readAsText(f); e.target.value = "";
  };

  // Section CRUD
  const addSection = () => { const id = `sec_${Date.now().toString(36)}`; setSections((p) => [...p, { Id: id, Title: "YENİ BÖLÜM", Order: p.length + 1 }]); setActiveSection(id); };
  const updateSection = (id, u) => setSections((p) => p.map((s) => s.Id === id ? { ...s, ...u } : s));
  const removeSection = (id) => { if (sections.length <= 1) return; setSections((p) => p.filter((s) => s.Id !== id)); setFields((p) => p.map((f) => f.SectionId === id ? { ...f, SectionId: sections.find((s) => s.Id !== id)?.Id } : f)); if (activeSection === id) setActiveSection(sections.find((s) => s.Id !== id)?.Id); };

  // Field CRUD
  const addField = (ft = 1) => { const f = createEmptyField(fields.length + 1, ft, activeSection); setFields((p) => [...p, f]); setEditingField(f.Id); };
  const updateField = (id, u) => setFields((fs) => fs.map((f) => f.Id === id ? { ...f, ...u } : f));
  const updateFieldConfig = (id, cu) => setFields((fs) => fs.map((f) => f.Id !== id ? f : { ...f, Config: { ...f.Config, ...cu } }));
  const removeField = (id) => { setFields((fs) => fs.filter((f) => f.Id !== id).map((f, i) => ({ ...f, Order: i + 1 }))); if (editingField === id) setEditingField(null); };
  const duplicateField = (id) => { const s = fields.find((f) => f.Id === id); if (!s) return; const d = JSON.parse(JSON.stringify(s)); d.Id = `field_${Date.now().toString(36)}`; d.Order = fields.length + 1; d.Label = `${s.Label || ""} (kopya)`; setFields((p) => [...p, d]); showToastMsg("Kopyalandı!"); };

  // Drag
  const handleDrop = (e, idx) => {
    const pt = e.dataTransfer.getData("palette-type");
    if (pt) { const f = createEmptyField(idx + 1, parseInt(pt), activeSection); const u = [...fields]; u.splice(idx, 0, f); setFields(u.map((x, i) => ({ ...x, Order: i + 1 }))); setEditingField(f.Id); }
    else if (dragIdx !== null && dragIdx !== idx) { const u = [...fields]; const [m] = u.splice(dragIdx, 1); u.splice(idx, 0, m); setFields(u.map((x, i) => ({ ...x, Order: i + 1 }))); }
    setDragIdx(null);
  };

  const handleShare = async () => {
    const json = buildJson();
    const u = generateShareUrl(json);
    setShareUrl(u);
    setShowQR(true);
    setQrLoading(true);
    setQrPayload(null);
    try {
      const blobId = await uploadJsonBlob(json);
      // QR'a sadece fetch URL koy (~55 char) — anında okunur
      const fetchUrl = `${JSONBLOB_API}/${blobId}`;
      setQrPayload(fetchUrl);
      setQrMode("blob");
      showToastMsg("QR hazır!");
    } catch (err) {
      console.warn("JSONBlob failed, using compressed:", err);
      const compressed = generateQrPayload(json);
      setQrPayload(compressed);
      setQrMode("compressed");
      showToastMsg("Yerel QR oluşturuldu");
    }
    setQrLoading(false);
    if (u) navigator.clipboard?.writeText(u).catch(() => {});
  };
  const loadTemplate = (t) => { setSections(t.json.Sections || [{ Id: "main", Title: "FORM", Order: 1 }]); setFields(t.json.FormFields); setEditingField(null); setActiveSection(t.json.Sections?.[0]?.Id || "main"); showToastMsg(`"${t.name}" yüklendi!`); };
  const saveAsTemplate = () => { if (!newTemplateName.trim()) return; const u = [...customTemplates, { name: newTemplateName.trim(), desc: `${fields.length} alan, ${sections.length} bölüm`, json: buildJson() }]; setCustomTemplates(u); saveCustomTemplates(u); setNewTemplateName(""); setShowSaveTemplate(false); showToastMsg("Şablon kaydedildi!"); };
  const deleteTemplate = (i) => { const u = customTemplates.filter((_, j) => j !== i); setCustomTemplates(u); saveCustomTemplates(u); showToastMsg("Silindi!"); };
  const getDeps = () => fields.filter((f) => f.DependsOn?.FieldId).map((f) => ({ from: f.DependsOn.FieldId, to: f.Id, fromLabel: fields.find((x) => x.Id === f.DependsOn.FieldId)?.Label || f.DependsOn.FieldId, toLabel: f.Label || f.Id, rules: Object.keys(f.DependsOn.Rules || {}), defaultVisible: f.DependsOn.DefaultVisible }));

  const sectionFields = fields.filter((f) => f.SectionId === activeSection).sort((a, b) => (a.Order ?? 0) - (b.Order ?? 0));
  const chipStyle = (bg, fg) => ({ padding: "1px 6px", borderRadius: 4, fontSize: 9, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.3, background: bg, color: fg, lineHeight: "16px" });
  const tabs = [
    { id: "builder", label: "🔨 Oluşturucu", count: fields.length },
    { id: "json", label: "{ } JSON" },
    { id: "graph", label: "📱 Ekran Hiyerarşisi" },
    { id: "templates", label: "📦 Şablonlar" },
  ];

  return (
    <div style={{ fontFamily: "'JetBrains Mono', 'Fira Code', monospace", background: C.bg, color: C.text, minHeight: "100vh", display: "flex", flexDirection: "column" }}>
      <input ref={fileRef} type="file" accept=".json" style={{ display: "none" }} onChange={handleFileUpload} />

      {/* ── HEADER ── */}
      <header style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 24px", borderBottom: `1px solid ${C.border}`, background: C.surface }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 24 }}>⚡</span>
          <h1 style={{ fontSize: 17, fontWeight: 700, margin: 0 }}>Dynamic Form Builder</h1>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button style={{ background: C.surface2, color: C.text, border: `1px solid ${C.border}`, padding: "7px 14px", borderRadius: 6, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }} onClick={() => fileRef.current?.click()}>📂 JSON Yükle</button>
          <button style={{ background: C.surface2, color: C.text, border: `1px solid ${C.border}`, padding: "7px 14px", borderRadius: 6, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }} onClick={() => { navigator.clipboard?.writeText(JSON.stringify(buildJson(), null, 2)); showToastMsg("JSON kopyalandı!"); }}>📋 Kopyala</button>
          <button style={{ background: C.accent, color: C.bg, border: "none", padding: "7px 14px", borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }} onClick={handleShare}>📤 Paylaş</button>
        </div>
      </header>

      {/* ── TABS ── */}
      <nav style={{ display: "flex", borderBottom: `1px solid ${C.border}`, background: C.surface, padding: "0 16px" }}>
        {tabs.map((t) => (
          <button key={t.id} style={{ background: "none", border: "none", color: activeTab === t.id ? C.accent : C.text2, padding: "11px 18px", fontSize: 12, cursor: "pointer", borderBottom: `2px solid ${activeTab === t.id ? C.accent : "transparent"}`, display: "flex", alignItems: "center", gap: 6, fontFamily: "inherit", transition: "all 0.15s" }} onClick={() => setActiveTab(t.id)}>
            {t.label}
            {t.count != null && <span style={{ background: C.surface2, padding: "1px 6px", borderRadius: 8, fontSize: 10, fontWeight: 700 }}>{t.count}</span>}
          </button>
        ))}
      </nav>

      {/* ── CONTENT ── */}
      <div style={{ flex: 1, overflow: "hidden" }}>

        {/* ═══ BUILDER ═══ */}
        {activeTab === "builder" && (
          <div style={{ display: "flex", height: "calc(100vh - 108px)" }}>
            <div style={{ width: 420, borderRight: `1px solid ${C.border}`, display: "flex", flexDirection: "column", background: C.bg }}>
              <ComponentPalette onAddField={addField} />
              {/* Section tabs */}
              <div style={{ display: "flex", alignItems: "center", padding: "0 12px", borderBottom: `1px solid ${C.border}`, background: C.surface, gap: 2, overflowX: "auto" }}>
                {sections.map((s) => (
                  <div key={s.Id} style={{ display: "flex", alignItems: "center", gap: 2 }}>
                    <button style={{ padding: "6px 14px", borderRadius: "6px 6px 0 0", fontSize: 11, fontWeight: 700, cursor: "pointer", border: "1px solid transparent", borderBottom: "none", background: activeSection === s.Id ? C.surface : "transparent", color: activeSection === s.Id ? C.accent : C.text2, fontFamily: "inherit", textTransform: "uppercase", letterSpacing: 0.5 }} onClick={() => setActiveSection(s.Id)}>
                      {s.Title || s.Id} <span style={{ fontSize: 9, opacity: 0.6, marginLeft: 4 }}>{fields.filter((f) => f.SectionId === s.Id).length}</span>
                    </button>
                    {sections.length > 1 && <button style={{ background: "none", border: "none", color: C.text2, fontSize: 10, cursor: "pointer", padding: "2px 4px" }} onClick={() => removeSection(s.Id)}>✕</button>}
                  </div>
                ))}
                <button style={{ background: "none", border: `1px dashed ${C.accent}50`, color: C.accent, padding: "4px 8px", borderRadius: 4, fontSize: 10, cursor: "pointer", fontFamily: "inherit", marginLeft: 4 }} onClick={addSection}>+</button>
              </div>
              {/* Section title */}
              <div style={{ padding: "8px 16px", borderBottom: `1px solid ${C.border}`, background: C.surface }}>
                <input style={{ background: C.surface2, border: `1px solid ${C.border}`, color: C.accent, padding: "6px 10px", borderRadius: 6, fontSize: 13, fontWeight: 700, width: "100%", outline: "none", fontFamily: "inherit" }} value={sections.find((s) => s.Id === activeSection)?.Title || ""} onChange={(e) => updateSection(activeSection, { Title: e.target.value })} placeholder="Bölüm başlığı" />
              </div>
              {/* Field list */}
              <div style={{ flex: 1, overflowY: "auto", padding: "8px 12px", display: "flex", flexDirection: "column", gap: 4 }} onDragOver={(e) => e.preventDefault()} onDrop={(e) => { e.preventDefault(); const pt = e.dataTransfer.getData("palette-type"); if (pt) addField(parseInt(pt)); }}>
                {sectionFields.length === 0 && (
                  <div style={{ textAlign: "center", padding: "36px 16px", border: `2px dashed ${C.border}`, borderRadius: 10, marginTop: 8 }}>
                    <div style={{ fontSize: 36 }}>📋</div>
                    <div style={{ fontSize: 13, fontWeight: 600, marginTop: 8 }}>Bu bölüm boş</div>
                    <div style={{ fontSize: 11, color: C.text2, marginTop: 4 }}>Yukarıdan sürükleyin veya tıklayın</div>
                  </div>
                )}
                {sectionFields.map((field, idx) => {
                  const info = fieldTypeInfo(field.FieldType);
                  const isActive = editingField === field.Id;
                  const gIdx = fields.indexOf(field);
                  return (
                    <div
                      key={field.Id} draggable
                      onDragStart={() => setDragIdx(gIdx)}
                      onDragOver={(e) => e.preventDefault()}
                      onDragEnd={() => setDragIdx(null)}
                      onDrop={(e) => handleDrop(e, gIdx)}
                      style={{ background: isActive ? C.surface2 : C.surface, border: `1px solid ${isActive ? C.accent : C.border}`, borderRadius: 8, padding: "8px 10px", cursor: "pointer", transition: "all 0.12s", opacity: dragIdx === gIdx ? 0.4 : 1 }}
                      onClick={() => setEditingField(isActive ? null : field.Id)}
                    >
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ color: C.text2, fontSize: 14, cursor: "grab" }}>⠿</span>
                        <span style={{ fontSize: 16, flexShrink: 0 }}>{info.icon}</span>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 12, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{field.Label || "(İsimsiz)"}</div>
                          <div style={{ fontSize: 9, color: C.text2, marginTop: 1 }}>{info.label} · {field.Id}</div>
                        </div>
                        <div style={{ display: "flex", gap: 3, flexShrink: 0 }}>
                          {field.Config?.Required && <span style={chipStyle(C.warning + "25", C.warning)}>Zorunlu</span>}
                          {field.Config?.Visible === false && <span style={chipStyle(C.text2 + "25", C.text2)}>Gizli</span>}
                          {field.DependsOn && <span style={chipStyle(C.blue + "25", C.blue)}>Bağımlı</span>}
                        </div>
                        <div style={{ display: "flex", gap: 2, flexShrink: 0 }}>
                          <button style={{ background: "none", border: "none", fontSize: 12, cursor: "pointer", padding: 2, opacity: 0.5 }} onClick={(e) => { e.stopPropagation(); duplicateField(field.Id); }}>📑</button>
                          <button style={{ background: "none", border: "none", fontSize: 12, cursor: "pointer", padding: 2, opacity: 0.7 }} onClick={(e) => { e.stopPropagation(); removeField(field.Id); }}>🗑</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
            {/* Editor panel */}
            <div style={{ flex: 1, overflowY: "auto", background: C.bg }}>
              {editingField ? (
                <FieldEditor field={fields.find((f) => f.Id === editingField)} allFields={fields} sections={sections} onUpdate={updateField} onUpdateConfig={updateFieldConfig} onClose={() => setEditingField(null)} />
              ) : (
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%", textAlign: "center", padding: 48, opacity: 0.7 }}>
                  <div style={{ fontSize: 40 }}>👈</div>
                  <div style={{ fontSize: 15, fontWeight: 700, marginTop: 12 }}>Bir alan seçin</div>
                  <div style={{ fontSize: 12, color: C.text2, marginTop: 4 }}>Soldaki listeden alana tıklayın</div>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ═══ JSON ═══ */}
        {activeTab === "json" && (
          <div style={{ height: "calc(100vh - 108px)", display: "flex", flexDirection: "column" }}>
            <div style={{ display: "flex", gap: 8, padding: "8px 16px", alignItems: "center", background: C.surface, borderBottom: `1px solid ${C.border}` }}>
              <button style={{ background: C.surface2, border: `1px solid ${C.border}`, color: C.text, padding: "5px 12px", borderRadius: 6, fontSize: 11, cursor: "pointer", fontFamily: "inherit" }} onClick={() => { try { setJsonText(JSON.stringify(JSON.parse(jsonText), null, 2)); showToastMsg("Formatlandı!"); } catch (e) { setJsonError(e.message); } }}>✨ Formatla</button>
              <button style={{ background: C.surface2, border: `1px solid ${C.border}`, color: C.text, padding: "5px 12px", borderRadius: 6, fontSize: 11, cursor: "pointer", fontFamily: "inherit" }} onClick={() => { navigator.clipboard?.writeText(jsonText); showToastMsg("Kopyalandı!"); }}>📋 Kopyala</button>
              <button style={{ background: C.surface2, border: `1px solid ${C.border}`, color: C.text, padding: "5px 12px", borderRadius: 6, fontSize: 11, cursor: "pointer", fontFamily: "inherit" }} onClick={() => fileRef.current?.click()}>📂 Yükle</button>
              <span style={{ marginLeft: "auto", fontSize: 11, color: jsonError ? C.danger : C.success }}>{jsonError ? `⚠ ${jsonError}` : `● Otomatik eşitleme · ${fields.length} alan · ${sections.length} bölüm`}</span>
            </div>
            <JsonCodeEditor value={jsonText} onChange={handleJsonEdit} error={jsonError} />
          </div>
        )}

        {/* ═══ SCREEN HIERARCHY ═══ */}
        {activeTab === "graph" && (() => {
          const fi = fieldTypeInfo;
          const getField = (id) => fields.find(x => x.Id === id);

          // Group fields by section
          const sectionGroups = sections.map(sec => ({
            ...sec,
            fields: fields.filter(f => f.SectionId === sec.Id).sort((a, b) => (a.Order ?? 0) - (b.Order ?? 0)),
          }));

          // Find all parent fields that have children depending on them
          const parentMap = {};
          fields.forEach(f => {
            if (!f.DependsOn?.FieldId) return;
            const pid = f.DependsOn.FieldId;
            if (!parentMap[pid]) parentMap[pid] = [];
            parentMap[pid].push(f);
          });

          // Collect all unique scenarios across the form
          // A scenario = a combination of parent selections
          // For simplicity, show scenarios per-parent (not combinatorial)
          const allParents = Object.keys(parentMap).map(id => getField(id)).filter(Boolean);

          // For a given parent value selection, determine field visibility
          const getFieldState = (field, parentSelections) => {
            if (!field.DependsOn?.FieldId) {
              // No dependency - always show with base config
              return { visible: field.Config?.Visible !== false, required: !!field.Config?.Required, source: "static" };
            }
            const parentVal = parentSelections[field.DependsOn.FieldId];
            if (parentVal === undefined || parentVal === null) {
              // Parent not selected - use default
              return { visible: !!field.DependsOn.DefaultVisible, required: false, source: "default" };
            }
            const rule = field.DependsOn.Rules?.[parentVal];
            if (rule) {
              return {
                visible: rule.Visible !== false,
                required: !!rule.Required,
                maxLength: rule.MaxLength,
                placeholder: rule.Placeholder,
                source: "rule",
              };
            }
            return { visible: !!field.DependsOn.DefaultVisible, required: false, source: "default" };
          };

          // Build screen scenarios: for each parent, generate screens per option
          const buildScreens = () => {
            if (allParents.length === 0) return [{ label: "Tek Ekran", selections: {} }];

            const screens = [{ label: "Başlangıç (seçim yok)", selections: {}, isDefault: true }];

            allParents.forEach(parent => {
              const opts = parent.Config?.Options || [];
              // Non-option parents (input-based deps)
              if (opts.length === 0) {
                const ruleKeys = [...new Set((parentMap[parent.Id] || []).flatMap(ch => Object.keys(ch.DependsOn?.Rules || {})))];
                ruleKeys.forEach(key => {
                  screens.push({ label: `${parent.Label || parent.Id} = "${key}"`, selections: { [parent.Id]: key }, trigger: parent });
                });
              } else {
                opts.forEach(opt => {
                  screens.push({ label: `${parent.Label || parent.Id} → ${opt.Label || opt.Value}`, selections: { [parent.Id]: opt.Value }, trigger: parent, optLabel: opt.Label || opt.Value });
                });
              }
            });

            return screens;
          };

          const screens = buildScreens();
          const hasDeps = allParents.length > 0;
          const totalScreens = screens.length;

          // Mini phone mockup field renderer
          const renderMockField = (field, state, isParent) => {
            const info = fi(field.FieldType);
            const vis = state.visible;
            const bg = isParent ? "#1e293b" : vis ? "#1a1a2e" : "#111";
            const borderCol = isParent ? C.accent2 : vis ? (state.source === "rule" ? C.accent : C.border) : C.border;

            return (
              <div key={field.Id} style={{
                padding: "8px 10px", borderRadius: 8, marginBottom: 4,
                background: bg, border: `1px solid ${borderCol}`,
                opacity: vis ? 1 : 0.25, transition: "all 0.2s",
                display: "flex", alignItems: "center", gap: 8,
              }}>
                <span style={{ fontSize: 13, flexShrink: 0 }}>{info.icon}</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 11, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                    {field.Label || field.Id}
                  </div>
                  {vis && state.placeholder && (
                    <div style={{ fontSize: 9, color: C.text2, marginTop: 1 }}>"{state.placeholder}"</div>
                  )}
                </div>
                <div style={{ display: "flex", gap: 3, flexShrink: 0 }}>
                  {isParent && <span style={{ fontSize: 8, padding: "1px 5px", background: C.accent2 + "30", color: C.accent2, borderRadius: 3 }}>Tetikleyici</span>}
                  {vis && state.required && <span style={{ fontSize: 8, padding: "1px 5px", background: C.warning + "30", color: C.warning, borderRadius: 3 }}>Zorunlu</span>}
                  {vis && state.maxLength && <span style={{ fontSize: 8, padding: "1px 5px", background: C.blue + "30", color: C.blue, borderRadius: 3 }}>max:{state.maxLength}</span>}
                  {!vis && <span style={{ fontSize: 8, padding: "1px 5px", background: C.text2 + "20", color: C.text2, borderRadius: 3 }}>Gizli</span>}
                </div>
              </div>
            );
          };

          return (
            <div style={{ padding: 24, overflowY: "auto", height: "calc(100vh - 108px)" }}>
              {/* Header */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                <h3 style={{ margin: 0, fontSize: 15, fontWeight: 700, color: C.accent }}>Ekran Hiyerarşisi</h3>
                <div style={{ display: "flex", gap: 8 }}>
                  <span style={{ fontSize: 11, padding: "4px 10px", background: C.surface2, borderRadius: 6, color: C.text2 }}>{totalScreens} ekran durumu</span>
                  <span style={{ fontSize: 11, padding: "4px 10px", background: C.surface2, borderRadius: 6, color: C.text2 }}>{fields.length} alan</span>
                </div>
              </div>
              <p style={{ fontSize: 11, color: C.text2, margin: "0 0 20px" }}>
                {hasDeps
                  ? "Her seçenek değerine göre ekranın nasıl göründüğünü karşılaştırın."
                  : "Henüz bağımlılık yok. Alanlara DependsOn ekleyerek farklı ekran durumları oluşturun."}
              </p>

              {/* Screen cards grid */}
              <div style={{ display: "grid", gridTemplateColumns: `repeat(auto-fill, minmax(260px, 1fr))`, gap: 16 }}>
                {screens.map((screen, si) => {
                  // Count visible fields for this scenario
                  const allFieldStates = fields.map(f => ({
                    field: f,
                    state: getFieldState(f, screen.selections),
                    isParent: !!parentMap[f.Id],
                  }));
                  const visibleCount = allFieldStates.filter(fs => fs.state.visible).length;
                  const hiddenCount = allFieldStates.filter(fs => !fs.state.visible).length;

                  return (
                    <div key={si} style={{
                      background: C.surface, border: `1px solid ${screen.isDefault ? C.border : C.accent + "30"}`,
                      borderRadius: 16, overflow: "hidden", display: "flex", flexDirection: "column",
                    }}>
                      {/* Screen label */}
                      <div style={{ padding: "12px 14px", borderBottom: `1px solid ${C.border}`, background: screen.isDefault ? C.surface2 : C.surface }}>
                        <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 4, color: screen.isDefault ? C.text2 : C.accent }}>
                          {screen.isDefault ? "○ " : "● "}{screen.label}
                        </div>
                        <div style={{ display: "flex", gap: 6 }}>
                          <span style={{ fontSize: 9, padding: "2px 6px", background: C.success + "15", color: C.success, borderRadius: 4 }}>{visibleCount} görünür</span>
                          {hiddenCount > 0 && <span style={{ fontSize: 9, padding: "2px 6px", background: C.text2 + "15", color: C.text2, borderRadius: 4 }}>{hiddenCount} gizli</span>}
                        </div>
                      </div>

                      {/* Phone mockup */}
                      <div style={{ padding: "10px 10px 14px", flex: 1 }}>
                        {/* Phone notch */}
                        <div style={{ textAlign: "center", marginBottom: 8 }}>
                          <div style={{ display: "inline-block", width: 40, height: 3, borderRadius: 2, background: C.border }} />
                        </div>

                        {/* Sections & fields */}
                        {sectionGroups.map(sec => {
                          const secFieldStates = allFieldStates.filter(fs => fs.field.SectionId === sec.Id);
                          const anyVisible = secFieldStates.some(fs => fs.state.visible);
                          if (secFieldStates.length === 0) return null;

                          return (
                            <div key={sec.Id} style={{ marginBottom: 8 }}>
                              {/* Section title */}
                              <div style={{
                                fontSize: 9, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1,
                                color: anyVisible ? C.accent : C.text2, padding: "4px 6px", marginBottom: 3,
                                opacity: anyVisible ? 1 : 0.4,
                              }}>
                                {sec.Title || sec.Id}
                              </div>
                              {/* Fields */}
                              {secFieldStates.map(({ field, state, isParent }) => {
                                // For parent field in this scenario, mark the selected option
                                const isSelected = screen.selections[field.Id] != null;
                                return renderMockField(field, { ...state, visible: state.visible || isParent }, isParent && isSelected);
                              })}
                            </div>
                          );
                        })}

                        {/* Phone home bar */}
                        <div style={{ textAlign: "center", marginTop: 8 }}>
                          <div style={{ display: "inline-block", width: 32, height: 3, borderRadius: 2, background: C.border }} />
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Dependency summary table */}
              {hasDeps && (
                <div style={{ marginTop: 28 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, color: C.text2, marginBottom: 10 }}>
                    Bağımlılık Özeti
                  </div>
                  <div style={{ background: C.surface, borderRadius: 10, border: `1px solid ${C.border}`, overflow: "hidden" }}>
                    {allParents.map(parent => {
                      const pInfo = fi(parent.FieldType);
                      const children = parentMap[parent.Id];
                      const opts = parent.Config?.Options || [];
                      return (
                        <div key={parent.Id} style={{ padding: "12px 16px", borderBottom: `1px solid ${C.border}` }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                            <span style={{ fontSize: 16 }}>{pInfo.icon}</span>
                            <span style={{ fontWeight: 700, fontSize: 13 }}>{parent.Label || parent.Id}</span>
                            <span style={{ fontSize: 10, color: C.text2 }}>({opts.length} seçenek)</span>
                          </div>
                          {/* Table: option → which children appear */}
                          <div style={{ display: "grid", gridTemplateColumns: `100px repeat(${children.length}, 1fr)`, gap: 1, fontSize: 10, background: C.border, borderRadius: 6, overflow: "hidden" }}>
                            {/* Header row */}
                            <div style={{ background: C.surface2, padding: "6px 8px", fontWeight: 700, color: C.text2 }}>Seçenek</div>
                            {children.map(ch => (
                              <div key={ch.Id} style={{ background: C.surface2, padding: "6px 8px", fontWeight: 700, textAlign: "center", color: C.text }}>
                                {fi(ch.FieldType).icon} {ch.Label || ch.Id}
                              </div>
                            ))}
                            {/* Default row */}
                            <div style={{ background: C.bg, padding: "6px 8px", color: C.text2, fontStyle: "italic" }}>Seçim yok</div>
                            {children.map(ch => {
                              const vis = !!ch.DependsOn?.DefaultVisible;
                              return (
                                <div key={ch.Id} style={{ background: C.bg, padding: "6px 8px", textAlign: "center", color: vis ? C.success : C.text2 }}>
                                  {vis ? "👁" : "—"}
                                </div>
                              );
                            })}
                            {/* Option rows */}
                            {opts.map(opt => (
                              [
                                <div key={`l-${opt.Value}`} style={{ background: C.bg, padding: "6px 8px", color: C.accent, fontWeight: 600 }}>
                                  {opt.Label || opt.Value}
                                </div>,
                                ...children.map(ch => {
                                  const rule = ch.DependsOn?.Rules?.[opt.Value];
                                  const vis = rule ? rule.Visible !== false : !!ch.DependsOn?.DefaultVisible;
                                  const req = rule?.Required;
                                  return (
                                    <div key={`${opt.Value}-${ch.Id}`} style={{ background: C.bg, padding: "6px 8px", textAlign: "center", color: vis ? C.success : C.text2 }}>
                                      {vis ? (req ? "👁 ✱" : "👁") : "—"}
                                    </div>
                                  );
                                }),
                              ]
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          );
        })()}

        {/* ═══ TEMPLATES ═══ */}
        {activeTab === "templates" && (
          <div style={{ padding: 24, overflowY: "auto", height: "calc(100vh - 108px)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <h3 style={{ margin: 0, fontSize: 15, fontWeight: 700, color: C.accent }}>Şablonlar</h3>
              <button style={{ background: C.accent, color: C.bg, border: "none", padding: "7px 14px", borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }} onClick={() => setShowSaveTemplate(!showSaveTemplate)}>{showSaveTemplate ? "İptal" : "+ Şablon Kaydet"}</button>
            </div>
            {showSaveTemplate && (
              <div style={{ background: C.surface, border: `1px solid ${C.accent}40`, borderRadius: 10, padding: 16, marginBottom: 16 }}>
                <div style={{ display: "flex", gap: 8 }}>
                  <input style={{ flex: 1, background: C.bg, border: `1px solid ${C.border}`, color: C.text, padding: "8px 12px", borderRadius: 6, fontSize: 13, outline: "none", fontFamily: "inherit" }} value={newTemplateName} onChange={(e) => setNewTemplateName(e.target.value)} placeholder="Şablon adı..." onKeyDown={(e) => e.key === "Enter" && saveAsTemplate()} />
                  <button style={{ background: C.accent, color: C.bg, border: "none", padding: "8px 18px", borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }} onClick={saveAsTemplate}>Kaydet</button>
                </div>
                <div style={{ fontSize: 10, color: C.text2, marginTop: 6 }}>{fields.length} alan, {sections.length} bölüm kaydedilecek</div>
              </div>
            )}
            {customTemplates.length > 0 && (
              <>
                <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, color: C.text2, marginBottom: 10 }}>📌 Kaydedilen Şablonlar</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12, marginBottom: 20 }}>
                  {customTemplates.map((t, i) => (
                    <div key={`c${i}`} style={{ background: C.surface, border: `1px solid ${C.accent}30`, borderRadius: 10, padding: 16, position: "relative" }}>
                      <button style={{ position: "absolute", top: 8, right: 8, background: C.danger + "20", border: "none", color: C.danger, width: 22, height: 22, borderRadius: 4, cursor: "pointer", fontSize: 10 }} onClick={() => deleteTemplate(i)}>✕</button>
                      <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>{t.name}</div>
                      <div style={{ fontSize: 10, color: C.text2, marginBottom: 10 }}>{t.desc}</div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 10 }}>
                        {t.json.FormFields.slice(0, 6).map((f) => <span key={f.Id} style={{ fontSize: 10, padding: "2px 6px", background: C.surface2, borderRadius: 4 }}>{fieldTypeInfo(f.FieldType).icon} {f.Label || f.Id}</span>)}
                      </div>
                      <button style={{ background: C.accent, color: C.bg, border: "none", padding: "6px 14px", borderRadius: 6, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }} onClick={() => loadTemplate(t)}>Yükle →</button>
                    </div>
                  ))}
                </div>
              </>
            )}
            <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, color: C.text2, marginBottom: 10 }}>📦 Hazır Şablonlar</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12 }}>
              {BUILTIN_TEMPLATES.map((t, i) => (
                <div key={`b${i}`} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: 16, cursor: "pointer" }} onClick={() => loadTemplate(t)}>
                  <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>{t.name}</div>
                  <div style={{ fontSize: 10, color: C.text2, marginBottom: 10 }}>{t.desc}</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 10 }}>
                    {t.json.FormFields.slice(0, 5).map((f) => <span key={f.Id} style={{ fontSize: 10, padding: "2px 6px", background: C.surface2, borderRadius: 4 }}>{fieldTypeInfo(f.FieldType).icon} {f.Label || f.Id}</span>)}
                  </div>
                  <button style={{ background: C.accent, color: C.bg, border: "none", padding: "6px 14px", borderRadius: 6, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>Yükle →</button>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* QR Modal */}
      {showQR && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, backdropFilter: "blur(6px)" }} onClick={() => setShowQR(false)}>
          <div style={{ background: C.surface, borderRadius: 16, padding: 28, textAlign: "center", maxWidth: 500, width: "95%", border: `1px solid ${C.border}` }} onClick={(e) => e.stopPropagation()}>
            <h3 style={{ margin: "0 0 8px", fontSize: 18, color: C.accent }}>📱 QR ile Paylaş</h3>
            <p style={{ margin: "0 0 12px", fontSize: 12, color: C.text2 }}>Developer Options içerisinden QR okutarak test edin</p>

            {qrLoading && (
              <div style={{ padding: "40px 0", color: C.text2, fontSize: 13 }}>
                <div style={{ fontSize: 24, marginBottom: 8, animation: "pulse 1s infinite" }}>⏳</div>
                Form yükleniyor...
              </div>
            )}

            {!qrLoading && qrPayload && (
              <>
                <div style={{ marginBottom: 12, display: "flex", justifyContent: "center", gap: 6 }}>
                  {qrMode === "blob" ? (
                    <span style={{ fontSize: 10, padding: "3px 10px", borderRadius: 12, background: C.success + "20", color: C.success, fontWeight: 600 }}>
                      ☁️ Bulut · {qrPayload.length} karakter · Anında okunur
                    </span>
                  ) : (
                    <span style={{ fontSize: 10, padding: "3px 10px", borderRadius: 12, background: C.warning + "20", color: C.warning, fontWeight: 600 }}>
                      📦 Offline · {qrPayload.length} karakter {qrPayload.length > 2500 && " · ⚠ Büyük"}
                    </span>
                  )}
                </div>
                <div style={{ background: "#fff", borderRadius: 12, padding: 12, display: "inline-block", marginBottom: 16 }}>
                  <img src={generateQR(qrPayload, 500)} alt="QR" style={{ width: 380, height: 380, display: "block" }} />
                </div>
                <div style={{ display: "flex", gap: 4, marginBottom: 8 }}>
                  <button style={{ flex: 1, background: C.accent + "15", border: `1px solid ${C.accent}30`, color: C.accent, padding: "8px 12px", borderRadius: 6, fontSize: 11, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }} onClick={() => { navigator.clipboard?.writeText(qrPayload); showToastMsg("QR payload kopyalandı!"); }}>📋 QR Payload</button>
                  <button style={{ flex: 1, background: C.surface2, border: `1px solid ${C.border}`, color: C.text, padding: "8px 12px", borderRadius: 6, fontSize: 11, cursor: "pointer", fontFamily: "inherit" }} onClick={() => { navigator.clipboard?.writeText(shareUrl); showToastMsg("Link kopyalandı!"); }}>🔗 Link Kopyala</button>
                </div>
                <div style={{ marginBottom: 12 }}>
                  <input style={{ width: "100%", background: C.bg, border: `1px solid ${C.border}`, color: C.text2, padding: "6px 10px", borderRadius: 6, fontSize: 9, outline: "none", fontFamily: "inherit" }} value={qrPayload} readOnly onClick={(e) => e.target.select()} />
                </div>
              </>
            )}
            <button style={{ background: C.surface2, border: `1px solid ${C.border}`, color: C.text, padding: "7px 20px", borderRadius: 6, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }} onClick={() => setShowQR(false)}>Kapat</button>
          </div>
        </div>
      )}

      {/* Toast */}
      {toast && <div style={{ position: "fixed", bottom: 20, left: "50%", transform: "translateX(-50%)", background: C.accent, color: C.bg, padding: "8px 20px", borderRadius: 8, fontSize: 12, fontWeight: 700, zIndex: 1001, fontFamily: "inherit" }}>{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(DynamicFormBuilder));
</script>
</body>
</html>

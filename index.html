// ═══════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════
const fieldTypeInfo = (v) => FIELD_TYPES.find((t) => t.value === v) || FIELD_TYPES[0];
const loadCustomTemplates = () => { try { return JSON.parse(localStorage.getItem("dfb_templates") || "[]"); } catch { return []; } };
const saveCustomTemplates = (t) => { try { localStorage.setItem("dfb_templates", JSON.stringify(t)); } catch {} };
const generateShareUrl = (j) => { try { return `${location.origin}${location.pathname}#${btoa(unescape(encodeURIComponent(JSON.stringify(j))))}`; } catch { return null; } };

// ── JSONBlob via CORS proxy — POST için proxy, GET için direkt ──
const JSONBLOB_API = "https://jsonblob.com/api/jsonBlob";
const CORS_PROXIES = [
  (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

const uploadJsonBlob = async (json) => {
  // Her CORS proxy'yi dene
  for (let i = 0; i < CORS_PROXIES.length; i++) {
    const proxyUrl = CORS_PROXIES[i](JSONBLOB_API);
    try {
      console.log(`[QR] Trying proxy ${i + 1}:`, proxyUrl);
      const res = await fetch(proxyUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify(json),
      });
      // Proxy response header'ları iletir
      const blobId = res.headers.get("x-jsonblob-id")
        || res.headers.get("X-Jsonblob-Id")
        || (res.headers.get("Location") || "").split("/").pop()
        || "";
      console.log(`[QR] Proxy ${i + 1} status:`, res.status, "blobId:", blobId);
      if (blobId) return blobId;
    } catch (e) {
      console.warn(`[QR] Proxy ${i + 1} failed:`, e.message);
    }
  }
  throw new Error("Tüm proxy'ler başarısız");
};

// QR Payload oluştur
const generateQrPayload = (j) => {
  try {
    const jsonStr = JSON.stringify(j);
    if (typeof pako !== "undefined") {
      const compressed = pako.deflateRaw(new TextEncoder().encode(jsonStr));
      const b64 = btoa(String.fromCharCode(...compressed))
        .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
      return "Z~" + b64;
    }
    return btoa(unescape(encodeURIComponent(jsonStr)))
      .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  } catch { return null; }
};
const decodeQrPayload = (data) => {
  try {
    const restoreB64 = (s) => { let r = s.replace(/-/g, "+").replace(/_/g, "/"); while (r.length % 4) r += "="; return r; };
    if (data.startsWith("Z~") && typeof pako !== "undefined") {
      const binary = Uint8Array.from(atob(restoreB64(data.slice(2))), c => c.charCodeAt(0));
      return JSON.parse(new TextDecoder().decode(pako.inflateRaw(binary)));
    }
    return JSON.parse(decodeURIComponent(escape(atob(restoreB64(data)))));
  } catch { return null; }
};
const parseShareUrl = () => { try { const h = location.hash.slice(1); return h ? JSON.parse(decodeURIComponent(escape(atob(h)))) : null; } catch { return null; } };
const generateQR = (data, s) => `https://api.qrserver.com/v1/create-qr-code/?size=${s}x${s}&data=${encodeURIComponent(data)}&bgcolor=FFFFFF&color=000000&format=png&ecc=L&margin=6`;
const stripTypeFields = (o) => { if (Array.isArray(o)) return o.map(stripTypeFields); if (o && typeof o === "object") { const r = {}; for (const [k, v] of Object.entries(o)) { if (k === "__type" || k === "RawOptions") continue; r[k] = stripTypeFields(v); } return r; } return o; };
const extractFormData = (raw) => { let o = raw; if (o.Data && Array.isArray(o.Data) && o.Data.length > 0) o = o.Data[0]; o = stripTypeFields(o); if (o.FormFields) return o; for (const v of Object.values(o)) { if (v && typeof v === "object" && v.FormFields) return stripTypeFields(v); } return o; };
const createEmptyField = (order, ft = 1, sid = "main") => {
  const b = { Id: `field_${Date.now().toString(36)}`, Order: order, FieldType: ft, Label: "", SectionId: sid, Config: { Visible: true, Enabled: true, Required: false } };
  if (ft === 2 || ft === 4) b.Config.Options = [{ Value: "opt1", Label: "Seçenek 1" }, { Value: "opt2", Label: "Seçenek 2" }];
  if (ft === 1) b.Config.KeyboardType = 1;
  if (ft === 6) { b.Config.KeyboardType = 3; b.Config.Placeholder = "0,00"; }
  return b;
};

// ═══════════════════════════════════════════════════════════════
// JSON SYNTAX HIGHLIGHTER
// ═══════════════════════════════════════════════════════════════
const highlightJson = (text) => {
  return text
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/("(?:[^"\\]|\\.)*")\s*:/g, '<span style="color:#7dd3fc">$1</span><span style="color:#4a4a6a">:</span>')
    .replace(/:\s*("(?:[^"\\]|\\.)*")/g, ': <span style="color:#86efac">$1</span>')
    .replace(/:\s*(-?\d+\.?\d*)/g, ': <span style="color:#fbbf24">$1</span>')
    .replace(/:\s*(true|false)/g, ': <span style="color:#c084fc">$1</span>')
    .replace(/:\s*(null)/g, ': <span style="color:#6b7394;font-style:italic">$1</span>')
    .replace(/([{}\[\]])/g, '<span style="color:#6b7394">$1</span>');
};

// ═══════════════════════════════════════════════════════════════
// JSON CODE EDITOR (line numbers + syntax highlighting + collapse)
// ═══════════════════════════════════════════════════════════════
function JsonCodeEditor({ value, onChange, error }) {
  const taRef = useRef(null);
  const gutRef = useRef(null);
  const hlRef = useRef(null);
  const [curLine, setCurLine] = useState(0);
  const [collapsed, setCollapsed] = useState({}); // key: original line number of block start

  // Parse block structure from ORIGINAL value (not display value)
  const blockMap = useMemo(() => {
    const lines = value.split("\n");
    const map = {}; // startLine -> endLine
    const stack = [];
    lines.forEach((line, i) => {
      if (/[{\[]\s*$/.test(line.trimEnd())) stack.push(i);
      if (/^[\s]*[}\]]/.test(line) && stack.length) {
        const start = stack.pop();
        if (i - start > 1) map[start] = i; // only foldable if >1 line inside
      }
    });
    return map;
  }, [value]);

  // Build display lines: skip collapsed ranges, insert placeholder
  const { displayText, lineMap, collapseInfo } = useMemo(() => {
    const srcLines = value.split("\n");
    const outLines = [];
    const lmap = []; // displayLineIdx -> originalLineIdx
    const cinfo = {}; // displayLineIdx -> { hiddenCount, collapsed: true }
    let i = 0;
    while (i < srcLines.length) {
      const blockEnd = blockMap[i];
      if (blockEnd && collapsed[i]) {
        // Show opening line + " ... N satır ... " + closing bracket
        const openLine = srcLines[i];
        const closeBracket = srcLines[blockEnd].trim();
        const hiddenCount = blockEnd - i - 1;
        const placeholder = `${openLine}  /* ··· ${hiddenCount} satır gizli ··· */  ${closeBracket}`;
        outLines.push(placeholder);
        lmap.push(i);
        cinfo[outLines.length - 1] = { hiddenCount, start: i, end: blockEnd };
        i = blockEnd + 1;
      } else {
        outLines.push(srcLines[i]);
        lmap.push(i);
        i++;
      }
    }
    return { displayText: outLines.join("\n"), lineMap: lmap, collapseInfo: cinfo };
  }, [value, collapsed, blockMap]);

  const lineCount = useMemo(() => displayText.split("\n").length, [displayText]);
  const highlighted = useMemo(() => highlightJson(displayText), [displayText]);

  // Toggle collapse on an ORIGINAL line number
  const toggleCollapse = (origLine) => {
    setCollapsed(prev => {
      const next = { ...prev };
      if (next[origLine]) delete next[origLine];
      else next[origLine] = true;
      return next;
    });
  };

  // When user edits the display text, map back to source
  const handleChange = (newDisplayText) => {
    // If nothing is collapsed, pass through directly
    if (Object.keys(collapsed).length === 0) {
      onChange(newDisplayText);
      return;
    }
    // Uncollapse everything when user types (safest approach)
    setCollapsed({});
    onChange(newDisplayText);
  };

  // Scroll sync via transform
  const syncScroll = useCallback(() => {
    const ta = taRef.current;
    if (!ta) return;
    const top = ta.scrollTop;
    const left = ta.scrollLeft;
    if (gutRef.current) gutRef.current.style.transform = `translateY(${-top}px)`;
    if (hlRef.current) hlRef.current.style.transform = `translate(${-left}px, ${-top}px)`;
  }, []);

  useEffect(() => { requestAnimationFrame(syncScroll); }, [displayText, syncScroll]);

  const onKeyDown = (e) => {
    if (e.key === "Tab") {
      e.preventDefault();
      const t = e.target, s = t.selectionStart, end = t.selectionEnd;
      handleChange(t.value.substring(0, s) + "  " + t.value.substring(end));
      requestAnimationFrame(() => { t.selectionStart = t.selectionEnd = s + 2; });
    }
  };

  const updateCursor = () => {
    if (taRef.current) {
      setCurLine(taRef.current.value.substring(0, taRef.current.selectionStart).split("\n").length - 1);
    }
  };

  const monoFont = "'JetBrains Mono', 'Fira Code', monospace";
  const LH = 20;
  const PAD = 12;
  const GW = 54;

  return (
    <div style={{ position: "relative", display: "flex", flex: 1, overflow: "hidden", background: "#0a0a14" }}>
      {/* Gutter */}
      <div style={{ width: GW, flexShrink: 0, background: "#12121f", borderRight: "1px solid #1e1e36", overflow: "hidden", position: "relative" }}>
        <div ref={gutRef} style={{ paddingTop: PAD, willChange: "transform" }}>
          {Array.from({ length: lineCount }, (_, di) => {
            const origLine = lineMap[di] ?? di;
            const isFoldable = blockMap[origLine] != null;
            const isFolded = !!collapsed[origLine];
            const isCollapsedLine = !!collapseInfo[di];
            return (
              <div key={di} style={{
                height: LH, lineHeight: `${LH}px`, paddingRight: 6, fontSize: 11,
                color: di === curLine ? C.accent : isCollapsedLine ? C.accent2 : "#3a3a5a",
                display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 1,
              }}>
                {isFoldable && (
                  <span
                    onClick={() => toggleCollapse(origLine)}
                    style={{ cursor: "pointer", fontSize: 8, color: isFolded ? C.accent : "#555", padding: "2px", userSelect: "none", lineHeight: 1 }}
                  >
                    {isFolded ? "▶" : "▼"}
                  </span>
                )}
                <span style={{ minWidth: 20, textAlign: "right" }}>{origLine + 1}</span>
              </div>
            );
          })}
        </div>
      </div>

      {/* Code area */}
      <div style={{ flex: 1, position: "relative", overflow: "hidden" }}>
        {/* Highlight layer */}
        <div ref={hlRef} style={{
          position: "absolute", top: 0, left: 0,
          paddingTop: PAD, paddingLeft: 16, paddingRight: 16,
          font: `13px/${LH}px ${monoFont}`, whiteSpace: "pre",
          pointerEvents: "none", tabSize: 2,
          minWidth: "100%",
          willChange: "transform",
        }} dangerouslySetInnerHTML={{ __html: highlighted + "\n" }} />

        {/* Textarea */}
        <textarea
          ref={taRef}
          value={displayText}
          onChange={(e) => handleChange(e.target.value)}
          onScroll={syncScroll}
          onKeyDown={onKeyDown}
          onClick={updateCursor}
          onKeyUp={updateCursor}
          spellCheck={false}
          style={{
            position: "relative", zIndex: 1,
            width: "100%", height: "100%",
            background: "transparent", border: "none",
            color: "transparent", caretColor: C.accent,
            padding: `${PAD}px 16px`,
            font: `13px/${LH}px ${monoFont}`,
            resize: "none", outline: "none",
            tabSize: 2, whiteSpace: "pre",
            overflow: "auto",
          }}
        />
      </div>

      {/* Error bar */}
      {error && (
        <div style={{
          position: "absolute", bottom: 0, left: 0, right: 0, zIndex: 2,
          background: C.danger + "18", borderTop: `1px solid ${C.danger}40`,
          color: C.danger, padding: "6px 16px", fontSize: 11,
        }}>
          ⚠ {error}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// VALIDATORS (matching DynamicFormValidator.kt)
// ═══════════════════════════════════════════════════════════════
const validateTCKN = (v) => {
  if (!/^\d{11}$/.test(v)) return false;
  const d = v.split("").map(Number);
  if (d[0] === 0) return false;
  const s1 = d[0] + d[2] + d[4] + d[6] + d[8];
  const s2 = d[1] + d[3] + d[5] + d[7];
  if ((s1 * 7 - s2) % 10 !== d[9]) return false;
  const total = d.slice(0, 10).reduce((a, b) => a + b, 0);
  return total % 10 === d[10];
};
const validateVKN = (v) => {
  if (!/^\d{10}$/.test(v)) return false;
  const d = v.split("").map(Number);
  let total = 0;
  for (let i = 0; i < 9; i++) {
    let t = (d[i] + (9 - i)) % 10;
    t = (t * Math.pow(2, 9 - i)) % 9;
    if (t === 0 && (d[i] + (9 - i)) % 10 !== 0) t = 9;
    total += t;
  }
  return (10 - (total % 10)) % 10 === d[9];
};
const validateIBAN = (v) => {
  const clean = v.replace(/\s/g, "").toUpperCase();
  if (!/^TR\d{24}$/.test(clean)) return false;
  const rearranged = clean.slice(4) + clean.slice(0, 4);
  let numStr = "";
  for (const ch of rearranged) { numStr += ch >= "A" && ch <= "Z" ? (ch.charCodeAt(0) - 55).toString() : ch; }
  let rem = 0;
  for (let i = 0; i < numStr.length; i++) { rem = (rem * 10 + parseInt(numStr[i])) % 97; }
  return rem === 1;
};
const validateEmail = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
const validatePhone = (v) => /^(5\d{9})$/.test(v.replace(/\s/g, ""));

const runValidation = (value, field) => {
  const cfg = field.Config || {};
  const errors = [];
  
  if (cfg.Required && (!value || !value.trim())) {
    errors.push(cfg.Errors?.Required || "Bu alan zorunludur");
    return errors; // no need to check further
  }
  if (!value || !value.trim()) return errors;

  const len = value.trim().length;
  if (cfg.MinLength && len < cfg.MinLength) errors.push(cfg.Errors?.MinLength?.replace("{0}", cfg.MinLength) || `En az ${cfg.MinLength} karakter`);
  if (cfg.MaxLength && len > cfg.MaxLength) errors.push(cfg.Errors?.MaxLength?.replace("{0}", cfg.MaxLength) || `En fazla ${cfg.MaxLength} karakter`);

  // MinValue / MaxValue (AmountInput vb.)
  const numericVal = parseFloat(value.trim().replace(/,/g, "."));
  if (!isNaN(numericVal)) {
    if (cfg.MinValue != null && numericVal < cfg.MinValue) errors.push(cfg.Errors?.MinValue?.replace("{0}", String(cfg.MinValue)) || `En az ${cfg.MinValue} olmalı`);
    if (cfg.MaxValue != null && numericVal > cfg.MaxValue) errors.push(cfg.Errors?.MaxValue?.replace("{0}", String(cfg.MaxValue)) || `En fazla ${cfg.MaxValue} olmalı`);
  }

  (cfg.ValidationRules || []).forEach(rule => {
    const t = rule.Type;
    if (t === 0 && rule.Pattern) { try { if (!new RegExp(rule.Pattern).test(value)) errors.push(rule.ErrorMessage || "Geçersiz format"); } catch {} }
    if (t === 1 && !validateTCKN(value)) errors.push(rule.ErrorMessage || "Geçerli TCKN giriniz");
    if (t === 2 && !validateVKN(value)) errors.push(rule.ErrorMessage || "Geçerli VKN giriniz");
    if (t === 3 && !validateIBAN(value)) errors.push(rule.ErrorMessage || "Geçerli IBAN giriniz");
    if (t === 4 && !validateEmail(value)) errors.push(rule.ErrorMessage || "Geçerli e-posta giriniz");
    if (t === 5 && !validatePhone(value)) errors.push(rule.ErrorMessage || "Geçerli telefon giriniz");
  });
  return errors;
};

// ═══════════════════════════════════════════════════════════════
// MOBILE PREVIEW COMPONENT (interactive with validate button)
// ═══════════════════════════════════════════════════════════════
function FieldPreview({ field }) {
  const [rawValue, setRawValue] = useState("");
  const [validated, setValidated] = useState(false);
  const [selectedOpt, setSelectedOpt] = useState(null);
  const [checked, setChecked] = useState(false);
  const [radioVal, setRadioVal] = useState(null);

  // ── Mask helpers ──
  // mask: "### ### ## ##"  →  # = kullanıcı karakteri, diğerleri sabit
  const applyMask = (raw, mask) => {
    if (!mask) return raw;
    let result = "";
    let rawIdx = 0;
    for (let i = 0; i < mask.length && rawIdx < raw.length; i++) {
      if (mask[i] === "#") {
        result += raw[rawIdx];
        rawIdx++;
      } else {
        result += mask[i];
        // Eğer kullanıcı zaten sabit karakteri yazdıysa atla
        if (raw[rawIdx] === mask[i]) rawIdx++;
      }
    }
    return result;
  };

  const stripMask = (formatted, mask) => {
    if (!mask) return formatted;
    let raw = "";
    for (let i = 0; i < formatted.length; i++) {
      const maskChar = mask[i];
      if (maskChar === "#") {
        raw += formatted[i];
      }
      // Sabit karakterleri atla
    }
    return raw;
  };

  const getMaskMaxRaw = (mask) => {
    if (!mask) return Infinity;
    return (mask.match(/#/g) || []).length;
  };

  // Reset when field changes — use DefaultValue if available
  useEffect(() => {
    const dv = field?.Config?.DefaultValue || "";
    setRawValue(dv);
    setValidated(false);
    if (field?.FieldType === 2 && dv && field?.Config?.Options) {
      const idx = field.Config.Options.findIndex(o => o.Value === dv);
      setSelectedOpt(idx >= 0 ? field.Config.Options[idx] : null);
    } else { setSelectedOpt(null); }
    setChecked(dv === "true");
    setRadioVal(dv || null);
  }, [field?.Id, field?.FieldType, field?.Config?.DefaultValue]);

  if (!field) return null;
  const ft = field.FieldType;
  const cfg = field.Config || {};
  const label = field.Label || "Alan Adı";
  const ph = cfg.Placeholder || "";
  const mask = cfg.Mask && cfg.Mask.includes("#") ? cfg.Mask : null;
  const required = cfg.Required;
  const disabled = cfg.Enabled === false;
  const hidden = cfg.Visible === false;

  // Mask uygula: raw değer saklanır, görüntü maskelidir
  const displayValue = mask ? applyMask(rawValue, mask) : rawValue;
  // Validation'a raw değer gider (masksız)
  const validationValue = rawValue;

  const errors = validated ? runValidation(validationValue, field) : [];
  const hasError = errors.length > 0;
  const isValid = validated && !hasError;

  const sans = "'Inter', system-ui, -apple-system, sans-serif";
  const wrap = { background: "#fff", borderRadius: 12, padding: 16, opacity: hidden ? 0.4 : disabled ? 0.6 : 1, position: "relative" };
  const labelStyle = { fontSize: 12, fontWeight: 600, color: "#374151", marginBottom: 6, display: "flex", alignItems: "center", gap: 4, fontFamily: sans };
  const baseBorder = hasError ? "#ef4444" : isValid ? "#22c55e" : "#d1d5db";
  const inputStyle = { width: "100%", padding: "10px 12px", borderRadius: 8, border: `1.5px solid ${baseBorder}`, fontSize: 14, color: "#111827", background: disabled ? "#f3f4f6" : "#fff", fontFamily: sans, outline: "none", boxSizing: "border-box", transition: "border-color 0.15s" };
  const reqDot = required ? <span style={{ color: "#ef4444", fontSize: 14 }}>*</span> : null;
  const charCount = rawValue.length;
  const maxLen = cfg.MaxLength;
  const maskMaxRaw = mask ? getMaskMaxRaw(mask) : null;

  const handleMaskedChange = (e) => {
    const inputVal = e.target.value;
    if (mask) {
      // Kullanıcı maskelenmiş input'a yazıyor → raw'a çevir
      const stripped = stripMask(inputVal, mask);
      // Sadece mask'ın izin verdiği kadar raw karakter al
      const maxRaw = getMaskMaxRaw(mask);
      const clamped = stripped.substring(0, maxRaw);
      setRawValue(clamped);
    } else {
      setRawValue(inputVal);
    }
    if (validated) setValidated(false);
  };

  const handleValidate = () => setValidated(true);
  const handleReset = () => { setRawValue(""); setValidated(false); setSelectedOpt(null); setChecked(false); setRadioVal(null); };

  const errorEl = hasError ? (
    <div style={{ marginTop: 6 }}>
      {errors.map((e, i) => (
        <div key={i} style={{ fontSize: 11, color: "#ef4444", fontFamily: sans, display: "flex", alignItems: "center", gap: 4, marginTop: i > 0 ? 2 : 0 }}>
          <span style={{ fontSize: 10 }}>⚠</span> {e}
        </div>
      ))}
    </div>
  ) : null;

  const validEl = isValid ? (
    <div style={{ fontSize: 11, color: "#22c55e", fontFamily: sans, marginTop: 4, display: "flex", alignItems: "center", gap: 4 }}>
      <span>✓</span> Geçerli
    </div>
  ) : null;

  const counterEl = (ft === 1 || ft === 6) ? (
    <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4, fontSize: 10, fontFamily: sans }}>
      <span style={{ color: charCount > 0 && maxLen && charCount > maxLen ? "#ef4444" : "#9ca3af" }}>
        {charCount}{maxLen ? ` / ${maxLen}` : maskMaxRaw ? ` / ${maskMaxRaw}` : ""} karakter
      </span>
      {cfg.MinLength && <span style={{ color: charCount > 0 && charCount < cfg.MinLength ? "#f59e0b" : "#9ca3af" }}>min: {cfg.MinLength}</span>}
    </div>
  ) : null;

  // Validate + Reset buttons (shown for all interactive types)
  const actionBar = (ft <= 6) ? (
    <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
      <button onClick={handleValidate} style={{ flex: 1, padding: "8px 0", borderRadius: 8, border: "none", background: "#3b82f6", color: "#fff", fontSize: 13, fontWeight: 600, fontFamily: sans, cursor: "pointer", transition: "background 0.15s" }}>
        ✓ Doğrula
      </button>
      <button onClick={handleReset} style={{ padding: "8px 14px", borderRadius: 8, border: "1px solid #e5e7eb", background: "#fff", color: "#6b7280", fontSize: 12, fontFamily: sans, cursor: "pointer" }}>
        Temizle
      </button>
    </div>
  ) : null;

  // Mask placeholder: ### ### ## ## → ___ ___ __ __
  const maskPlaceholder = mask ? mask.replace(/#/g, "_") : null;

  if (hidden) {
    return (
      <div style={{ ...wrap, border: "1px dashed #d1d5db" }}>
        <div style={{ textAlign: "center", color: "#9ca3af", fontSize: 12, fontFamily: sans }}>
          👁️‍🗨️ Gizli alan: {label}
        </div>
      </div>
    );
  }

  // Input (1)
  if (ft === 1) {
    return (
      <div style={wrap}>
        <div style={labelStyle}>{label}{reqDot}</div>
        <input style={{ ...inputStyle, fontFamily: mask ? "monospace" : sans, letterSpacing: mask ? "1px" : "normal" }}
          placeholder={maskPlaceholder || ph || "Değer giriniz..."} disabled={disabled} value={displayValue}
          onChange={handleMaskedChange} />
        {mask && <div style={{ fontSize: 10, color: "#9ca3af", marginTop: 3, fontFamily: "monospace" }}>Maske: {mask}</div>}
        {counterEl}
        {errorEl}
        {validEl}
        {actionBar}
      </div>
    );
  }

  // Dropdown (2)
  if (ft === 2) {
    return (
      <div style={wrap}>
        <div style={labelStyle}>{label}{reqDot}</div>
        <div style={{ ...inputStyle, display: "flex", justifyContent: "space-between", alignItems: "center", color: selectedOpt ? "#111827" : "#9ca3af", cursor: "pointer" }}>
          <span>{selectedOpt?.Label || ph || "Seçiniz..."}</span>
          <span style={{ fontSize: 10 }}>▼</span>
        </div>
        {cfg.Options?.length > 0 && (
          <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginTop: 8 }}>
            {cfg.Options.map((o, i) => (
              <span key={i} onClick={() => { setSelectedOpt(o); setRawValue(o.Value); if (validated) setValidated(false); }}
                style={{ background: selectedOpt?.Value === o.Value ? "#3b82f6" : "#f3f4f6", color: selectedOpt?.Value === o.Value ? "#fff" : "#374151", padding: "4px 10px", borderRadius: 12, fontSize: 11, fontFamily: sans, cursor: "pointer", transition: "all 0.15s", border: `1px solid ${selectedOpt?.Value === o.Value ? "#3b82f6" : "#e5e7eb"}` }}>
                {o.Label || o.Value}
              </span>
            ))}
          </div>
        )}
        {errorEl}
        {validEl}
        {actionBar}
      </div>
    );
  }

  // Checkbox (3)
  if (ft === 3) {
    return (
      <div style={wrap}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }} onClick={() => { setChecked(!checked); setRawValue(!checked ? "true" : ""); if (validated) setValidated(false); }}>
          <div style={{ width: 20, height: 20, borderRadius: 4, border: `2px solid ${checked ? "#3b82f6" : hasError ? "#ef4444" : "#d1d5db"}`, background: checked ? "#3b82f6" : "#fff", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.15s" }}>
            {checked && <span style={{ color: "#fff", fontSize: 12, fontWeight: 700 }}>✓</span>}
          </div>
          <span style={{ ...labelStyle, margin: 0 }}>{label}{reqDot}</span>
        </div>
        {errorEl}
        {validEl}
        {actionBar}
      </div>
    );
  }

  // RadioGroup (4)
  if (ft === 4) {
    const opts = cfg.Options?.length > 0 ? cfg.Options : [{ Value: "opt1", Label: "Seçenek 1" }, { Value: "opt2", Label: "Seçenek 2" }];
    return (
      <div style={wrap}>
        <div style={labelStyle}>{label}{reqDot}</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {opts.map((o, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }} onClick={() => { setRadioVal(o.Value); setRawValue(o.Value); if (validated) setValidated(false); }}>
              <div style={{ width: 18, height: 18, borderRadius: "50%", border: `2px solid ${radioVal === o.Value ? "#3b82f6" : "#d1d5db"}`, display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.15s" }}>
                {radioVal === o.Value && <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#3b82f6" }} />}
              </div>
              <span style={{ fontSize: 13, color: "#374151", fontFamily: sans }}>{o.Label || o.Value}</span>
            </div>
          ))}
        </div>
        {errorEl}
        {validEl}
        {actionBar}
      </div>
    );
  }

  // DatePicker (5)
  if (ft === 5) {
    return (
      <div style={wrap}>
        <div style={labelStyle}>{label}{reqDot}</div>
        <input type="date" style={inputStyle} value={rawValue}
          onChange={(e) => { setRawValue(e.target.value); if (validated) setValidated(false); }} />
        {errorEl}
        {validEl}
        {actionBar}
      </div>
    );
  }

  // AmountInput (6)
  if (ft === 6) {
    const currency = cfg.CurrencyName || "₺";
    return (
      <div style={wrap}>
        <div style={labelStyle}>{label}{reqDot}</div>
        <div style={{ ...inputStyle, display: "flex", alignItems: "center", gap: 8, padding: 0, overflow: "hidden" }}>
          <span style={{ color: "#6b7280", fontWeight: 600, fontSize: 14, padding: "10px 0 10px 12px", fontFamily: sans }}>{currency}</span>
          <input style={{ border: "none", outline: "none", flex: 1, fontSize: 14, color: "#111827", fontFamily: mask ? "monospace" : sans, letterSpacing: mask ? "1px" : "normal", padding: "10px 12px 10px 0", background: "transparent" }}
            placeholder={maskPlaceholder || ph || "0,00"} value={displayValue} disabled={disabled}
            onChange={handleMaskedChange} />
        </div>
        {counterEl}
        {mask && <div style={{ fontSize: 10, color: "#9ca3af", marginTop: 3, fontFamily: "monospace" }}>Maske: {mask}</div>}
        {(cfg.MinValue != null || cfg.MaxValue != null) && (
          <div style={{ display: "flex", gap: 6, marginTop: 4 }}>
            {cfg.MinValue != null && <span style={{ fontSize: 10, color: "#9ca3af", fontFamily: sans }}>min: {cfg.MinValue} {currency}</span>}
            {cfg.MaxValue != null && <span style={{ fontSize: 10, color: "#9ca3af", fontFamily: sans }}>max: {cfg.MaxValue} {currency}</span>}
          </div>
        )}
        {errorEl}
        {validEl}
        {actionBar}
      </div>
    );
  }

  // InfoCard (7)
  if (ft === 7) {
    return (
      <div style={{ ...wrap, background: "#eff6ff", border: "1px solid #bfdbfe" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 36, height: 36, borderRadius: 8, background: "#3b82f6", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 700, fontSize: 16 }}>ℹ</div>
          <div>
            <div style={{ fontWeight: 700, fontSize: 14, color: "#1e3a5f", fontFamily: sans }}>{label}</div>
            {ph && <div style={{ fontSize: 12, color: "#6b7280", fontFamily: sans }}>{ph}</div>}
          </div>
        </div>
      </div>
    );
  }

  // InfoText (8)
  if (ft === 8) {
    const link = cfg.Link;
    return (
      <div style={wrap}>
        <div style={{ fontSize: 13, color: "#6b7280", lineHeight: 1.5, fontFamily: sans }}>
          {label}{ph ? `: ${ph}` : ""}
        </div>
        {link?.Text && (
          <div style={{ marginTop: 6 }}>
            <span style={{ fontSize: 12, color: "#3b82f6", textDecoration: "underline", cursor: "pointer", fontFamily: sans }}>
              🔗 {link.Text}
            </span>
            <span style={{ fontSize: 9, color: "#9ca3af", marginLeft: 6, fontFamily: sans }}>
              ({link.ActionType === 1 ? "URL" : link.ActionType === 2 ? "Popup" : link.ActionType === 3 ? "Resim" : "Link"})
            </span>
          </div>
        )}
      </div>
    );
  }

  return <div style={wrap}><div style={labelStyle}>{label}</div></div>;
}

// COMPONENT PALETTE
// ═══════════════════════════════════════════════════════════════
function ComponentPalette({ onAddField }) {
  return (
    <div style={{ padding: "10px 16px", borderBottom: `1px solid ${C.border}`, background: C.surface }}>
      <div style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, color: C.text2, marginBottom: 8 }}>
        Bileşenler — sürükle veya tıkla
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 5 }}>
        {FIELD_TYPES.map((ft) => (
          <div
            key={ft.value} draggable
            onDragStart={(e) => { e.dataTransfer.setData("palette-type", ft.value.toString()); e.dataTransfer.effectAllowed = "copy"; }}
            onClick={() => onAddField(ft.value)}
            style={{ background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 8, padding: "6px 4px", textAlign: "center", cursor: "grab", userSelect: "none", transition: "transform 0.12s" }}
          >
            <div style={{ fontSize: 18 }}>{ft.icon}</div>
            <div style={{ fontSize: 9, fontWeight: 600, color: C.text2, marginTop: 1 }}>{ft.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// SUB-COMPONENTS
// ═══════════════════════════════════════════════════════════════
function Label({ text }) {
  const r = text.endsWith("*");
  return <label style={{ display: "block", fontSize: 11, color: C.text2, marginTop: 10, marginBottom: 4, fontWeight: 500, textTransform: "uppercase", letterSpacing: 0.5 }}>{r ? text.slice(0, -2) : text}{r && <span style={{ color: C.danger, marginLeft: 2 }}>*</span>}</label>;
}

function Section({ title, children, defaultOpen, count }) {
  const [open, setOpen] = useState(defaultOpen !== false);
  return (
    <div style={{ marginBottom: 12, background: C.surface2, borderRadius: 8, overflow: "hidden", border: `1px solid ${C.border}` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", cursor: "pointer", color: C.accent, fontWeight: 600, fontSize: 12, textTransform: "uppercase", letterSpacing: 1 }} onClick={() => setOpen(!open)}>
        <span>{title}</span>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          {count != null && <span style={{ background: C.bg, padding: "1px 7px", borderRadius: 8, fontSize: 10, color: C.text2 }}>{count}</span>}
          <span style={{ fontSize: 12 }}>{open ? "▾" : "▸"}</span>
        </div>
      </div>
      {open && <div style={{ padding: "0 14px 14px" }}>{children}</div>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// FIELD EDITOR + PREVIEW
// ═══════════════════════════════════════════════════════════════
function FieldEditor({ field, allFields, sections, onUpdate, onUpdateConfig, onClose }) {
  if (!field) return null;
  const ft = field.FieldType;
  const hasOpts = ft === 2 || ft === 4; // Dropdown, RadioGroup
  const isInputLike = ft === 1 || ft === 6; // Input, AmountInput
  const isAmt = ft === 6;
  const isInfo = ft === 7 || ft === 8;
  const others = allFields.filter((f) => f.Id !== field.Id);
  const inp = { width: "100%", background: C.bg, border: `1px solid ${C.border}`, color: C.text, padding: "8px 10px", borderRadius: 6, fontSize: 13, outline: "none", fontFamily: "inherit", boxSizing: "border-box" };
  const smInp = { ...inp, fontSize: 12 };

  // Options CRUD
  const addOpt = () => onUpdateConfig(field.Id, { Options: [...(field.Config?.Options || []), { Value: "", Label: "" }] });
  const upOpt = (i, k, v) => onUpdateConfig(field.Id, { Options: (field.Config?.Options || []).map((o, j) => j === i ? { ...o, [k]: v } : o) });
  const rmOpt = (i) => onUpdateConfig(field.Id, { Options: (field.Config?.Options || []).filter((_, j) => j !== i) });

  // Validation Rules CRUD
  const addVal = () => onUpdateConfig(field.Id, { ValidationRules: [...(field.Config?.ValidationRules || []), { Type: 0, ErrorMessage: "" }] });
  const upVal = (i, u) => onUpdateConfig(field.Id, { ValidationRules: (field.Config?.ValidationRules || []).map((r, j) => j === i ? { ...r, ...u } : r) });
  const rmVal = (i) => onUpdateConfig(field.Id, { ValidationRules: (field.Config?.ValidationRules || []).filter((_, j) => j !== i) });

  // Errors update helper
  const upErr = (key, val) => onUpdateConfig(field.Id, { Errors: { ...(field.Config?.Errors || {}), [key]: val || undefined } });

  // Link update helper
  const upLink = (updates) => onUpdateConfig(field.Id, { Link: { ...(field.Config?.Link || {}), ...updates } });
  const clearLink = () => onUpdateConfig(field.Id, { Link: undefined });

  // TrailingAction update helper
  const upTrail = (updates) => onUpdateConfig(field.Id, { TrailingAction: { ...(field.Config?.TrailingAction || {}), ...updates } });
  const clearTrail = () => onUpdateConfig(field.Id, { TrailingAction: undefined });

  // Dependency CRUD
  const setDep = (p) => p ? onUpdate(field.Id, { DependsOn: { FieldId: p, DefaultVisible: false, Rules: {} } }) : onUpdate(field.Id, { DependsOn: undefined });
  const addDR = () => { const d = field.DependsOn || { FieldId: "", DefaultVisible: false, Rules: {} }; onUpdate(field.Id, { DependsOn: { ...d, Rules: { ...d.Rules, "": { Visible: true } } } }); };
  const upDR = (ok, nk, ru) => { const r = { ...field.DependsOn?.Rules }; if (ok !== nk) delete r[ok]; r[nk] = { ...(r[nk] || r[ok] || {}), ...ru }; onUpdate(field.Id, { DependsOn: { ...field.DependsOn, Rules: r } }); };
  const rmDR = (k) => { const r = { ...field.DependsOn?.Rules }; delete r[k]; onUpdate(field.Id, { DependsOn: { ...field.DependsOn, Rules: r } }); };

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", animation: "slideIn 0.2s ease" }}>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 20px", borderBottom: `1px solid ${C.border}`, background: C.surface }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 20 }}>{fieldTypeInfo(field.FieldType).icon}</span>
          <h3 style={{ margin: 0, fontSize: 15, fontWeight: 700, color: C.accent }}>{field.Label || field.Id || "Yeni Alan"}</h3>
        </div>
        <button style={{ background: "none", border: "none", color: C.text2, fontSize: 18, cursor: "pointer" }} onClick={onClose}>✕</button>
      </div>

      {/* Scrollable content */}
      <div style={{ flex: 1, overflowY: "auto", padding: "12px 20px" }}>

        {/* ── Temel Bilgiler ── */}
        <Section title="Temel Bilgiler">
          <Label text="Alan ID *" />
          <input style={inp} value={field.Id} onChange={(e) => onUpdate(field.Id, { Id: e.target.value })} />
          <Label text="Başlık *" />
          <input style={inp} value={field.Label || ""} onChange={(e) => onUpdate(field.Id, { Label: e.target.value })} placeholder="Alan başlığı" />
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ flex: 1 }}>
              <Label text="Alan Tipi *" />
              <select style={inp} value={field.FieldType} onChange={(e) => onUpdate(field.Id, { FieldType: parseInt(e.target.value) })}>
                {FIELD_TYPES.map((t) => <option key={t.value} value={t.value}>{t.icon} {t.label}</option>)}
              </select>
            </div>
            <div style={{ flex: 1 }}>
              <Label text="Section" />
              <select style={inp} value={field.SectionId || ""} onChange={(e) => onUpdate(field.Id, { SectionId: e.target.value })}>
                {sections.map((s) => <option key={s.Id} value={s.Id}>{s.Title || s.Id}</option>)}
              </select>
            </div>
          </div>
          <Label text="Placeholder" />
          <input style={inp} value={field.Config?.Placeholder || ""} onChange={(e) => onUpdateConfig(field.Id, { Placeholder: e.target.value })} />
          <Label text="Varsayılan Değer" />
          <input style={inp} value={field.Config?.DefaultValue || ""} onChange={(e) => onUpdateConfig(field.Id, { DefaultValue: e.target.value || undefined })} placeholder="Boş bırakılabilir" />
          {isAmt && (
            <><Label text="Para Birimi" />
            <input style={inp} value={field.Config?.CurrencyName || ""} onChange={(e) => onUpdateConfig(field.Id, { CurrencyName: e.target.value || undefined })} placeholder="TRY" /></>
          )}
          <div style={{ display: "flex", gap: 16, marginTop: 10 }}>
            {[["Visible", "Görünür"], ["Enabled", "Aktif"], ["Required", "Zorunlu"]].map(([p, l]) => (
              <label key={p} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: C.text2, cursor: "pointer" }}>
                <input type="checkbox" checked={p === "Required" ? !!field.Config?.[p] : field.Config?.[p] !== false} onChange={(e) => onUpdateConfig(field.Id, { [p]: e.target.checked })} /> {l}
              </label>
            ))}
          </div>
        </Section>

        {/* ── Uzunluk & Klavye (Input + AmountInput) ── */}
        {isInputLike && (
          <Section title="Uzunluk & Klavye">
            <div style={{ display: "flex", gap: 8 }}>
              <div style={{ flex: 1 }}><Label text="MinLength" /><input style={inp} type="number" value={field.Config?.MinLength ?? ""} onChange={(e) => onUpdateConfig(field.Id, { MinLength: e.target.value ? parseInt(e.target.value) : null })} /></div>
              <div style={{ flex: 1 }}><Label text="MaxLength" /><input style={inp} type="number" value={field.Config?.MaxLength ?? ""} onChange={(e) => onUpdateConfig(field.Id, { MaxLength: e.target.value ? parseInt(e.target.value) : null })} /></div>
            </div>
            {isAmt && (
              <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                <div style={{ flex: 1 }}><Label text="MinValue" /><input style={inp} type="number" step="0.01" value={field.Config?.MinValue ?? ""} onChange={(e) => onUpdateConfig(field.Id, { MinValue: e.target.value ? parseFloat(e.target.value) : null })} /></div>
                <div style={{ flex: 1 }}><Label text="MaxValue" /><input style={inp} type="number" step="0.01" value={field.Config?.MaxValue ?? ""} onChange={(e) => onUpdateConfig(field.Id, { MaxValue: e.target.value ? parseFloat(e.target.value) : null })} /></div>
              </div>
            )}
            <Label text="Maske" />
            <input style={inp} value={field.Config?.Mask || ""} onChange={(e) => onUpdateConfig(field.Id, { Mask: e.target.value || undefined })} placeholder="### ### ## ##" />
            <Label text="Klavye Tipi" />
            <select style={inp} value={field.Config?.KeyboardType ?? 0} onChange={(e) => onUpdateConfig(field.Id, { KeyboardType: parseInt(e.target.value) || undefined })}>
              {KEYBOARD_TYPES.map((k) => <option key={k.value} value={k.value}>{k.label}</option>)}
            </select>
          </Section>
        )}

        {/* ── Seçenekler (Dropdown, RadioGroup) ── */}
        {hasOpts && (
          <Section title="Seçenekler" count={field.Config?.Options?.length || 0}>
            {(field.Config?.Options || []).map((opt, idx) => (
              <div key={idx} style={{ display: "flex", gap: 6, marginBottom: 6, alignItems: "center" }}>
                <span style={{ color: C.text2, fontSize: 10, width: 14, textAlign: "center", flexShrink: 0 }}>{idx + 1}</span>
                <input style={{ ...inp, flex: 1 }} value={opt.Value} onChange={(e) => upOpt(idx, "Value", e.target.value)} placeholder="Değer" />
                <input style={{ ...inp, flex: 1 }} value={opt.Label} onChange={(e) => upOpt(idx, "Label", e.target.value)} placeholder="Etiket" />
                <button style={{ background: C.danger + "20", border: "none", color: C.danger, width: 22, height: 22, borderRadius: 4, cursor: "pointer", fontSize: 11, flexShrink: 0 }} onClick={() => rmOpt(idx)}>✕</button>
              </div>
            ))}
            <button style={{ background: "none", border: `1px dashed ${C.accent}60`, color: C.accent, padding: "5px 12px", borderRadius: 6, fontSize: 11, cursor: "pointer", fontFamily: "inherit", fontWeight: 600, marginTop: 4 }} onClick={addOpt}>+ Seçenek</button>
          </Section>
        )}

        {/* ── Doğrulama Kuralları ── */}
        {!isInfo && (
          <Section title="Doğrulama Kuralları" count={field.Config?.ValidationRules?.length || 0} defaultOpen={false}>
            {(field.Config?.ValidationRules || []).map((rule, idx) => (
              <div key={idx} style={{ background: C.bg, borderRadius: 6, padding: 10, marginBottom: 6, border: `1px solid ${C.border}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                  <span style={{ fontSize: 11, fontWeight: 700, color: C.text2 }}>Kural {idx + 1}</span>
                  <button style={{ background: C.danger + "20", border: "none", color: C.danger, width: 22, height: 22, borderRadius: 4, cursor: "pointer", fontSize: 11 }} onClick={() => rmVal(idx)}>✕</button>
                </div>
                <Label text="Tip" />
                <select style={smInp} value={rule.Type ?? 0} onChange={(e) => upVal(idx, { Type: parseInt(e.target.value) })}>
                  {VALIDATION_TYPES.map((v) => <option key={v.value} value={v.value}>{v.label}</option>)}
                </select>
                <Label text="Hata Mesajı" />
                <input style={{ ...smInp, marginTop: 2 }} value={rule.ErrorMessage || ""} onChange={(e) => upVal(idx, { ErrorMessage: e.target.value })} placeholder="Geçersiz değer girildi" />
                {rule.Type === 0 && <><Label text="Regex Pattern" /><input style={{ ...smInp, marginTop: 2 }} value={rule.Pattern || ""} onChange={(e) => upVal(idx, { Pattern: e.target.value })} placeholder="^[0-9]{10,11}$" /></>}
              </div>
            ))}
            <button style={{ background: "none", border: `1px dashed ${C.accent}60`, color: C.accent, padding: "5px 12px", borderRadius: 6, fontSize: 11, cursor: "pointer", fontFamily: "inherit", fontWeight: 600, marginTop: 4 }} onClick={addVal}>+ Doğrulama Kuralı</button>
          </Section>
        )}

        {/* ── Hata Mesajları (FieldErrors) ── */}
        {!isInfo && (
          <Section title="Hata Mesajları" defaultOpen={false}>
            <div style={{ fontSize: 10, color: C.text2, marginBottom: 8, lineHeight: 1.4 }}>
              Zorunlu, min/max uzunluk ve değer kontrolleri için özel hata mesajları. Boş bırakılırsa varsayılan mesaj kullanılır. <code style={{ color: C.accent, fontSize: 10 }}>{"{0}"}</code> ile limit değeri yazılır.
            </div>
            <Label text="Zorunlu Alan Hatası" />
            <input style={smInp} value={field.Config?.Errors?.Required || ""} onChange={(e) => upErr("Required", e.target.value)} placeholder="Bu alan zorunludur" />
            <Label text="Min Uzunluk Hatası" />
            <input style={smInp} value={field.Config?.Errors?.MinLength || ""} onChange={(e) => upErr("MinLength", e.target.value)} placeholder="En az {0} karakter girilmeli" />
            <Label text="Max Uzunluk Hatası" />
            <input style={smInp} value={field.Config?.Errors?.MaxLength || ""} onChange={(e) => upErr("MaxLength", e.target.value)} placeholder="En fazla {0} karakter girilmeli" />
            {isAmt && (
              <>
                <Label text="Min Değer Hatası" />
                <input style={smInp} value={field.Config?.Errors?.MinValue || ""} onChange={(e) => upErr("MinValue", e.target.value)} placeholder="En az {0} girilmeli" />
                <Label text="Max Değer Hatası" />
                <input style={smInp} value={field.Config?.Errors?.MaxValue || ""} onChange={(e) => upErr("MaxValue", e.target.value)} placeholder="En fazla {0} girilmeli" />
              </>
            )}
          </Section>
        )}

        {/* ── Link (FieldLink) — sadece InfoText ── */}
        {ft === 8 && (
        <Section title="Link" defaultOpen={!!field.Config?.Link}>
          {!field.Config?.Link ? (
            <button style={{ background: "none", border: `1px dashed ${C.accent}60`, color: C.accent, padding: "5px 12px", borderRadius: 6, fontSize: 11, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }} onClick={() => upLink({ ActionType: 1 })}>+ Link Ekle</button>
          ) : (
            <div style={{ background: C.bg, borderRadius: 6, padding: 10, border: `1px solid ${C.border}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <span style={{ fontSize: 11, fontWeight: 700, color: C.text2 }}>Link Ayarları</span>
                <button style={{ background: C.danger + "20", border: "none", color: C.danger, width: 22, height: 22, borderRadius: 4, cursor: "pointer", fontSize: 11 }} onClick={clearLink}>✕</button>
              </div>
              <Label text="Link Metni" />
              <input style={smInp} value={field.Config.Link.Text || ""} onChange={(e) => upLink({ Text: e.target.value })} placeholder="Detaylar için tıklayın" />
              <Label text="Aksiyon Tipi" />
              <select style={smInp} value={field.Config.Link.ActionType ?? 1} onChange={(e) => upLink({ ActionType: parseInt(e.target.value) })}>
                {LINK_ACTION_TYPES.map((t) => <option key={t.value} value={t.value}>{t.label}</option>)}
              </select>
              {(field.Config.Link.ActionType === 1 || !field.Config.Link.ActionType) && (
                <><Label text="URL" /><input style={smInp} value={field.Config.Link.Url || ""} onChange={(e) => upLink({ Url: e.target.value })} placeholder="https://..." /></>
              )}
              {field.Config.Link.ActionType === 3 && (
                <><Label text="Resim URL" /><input style={smInp} value={field.Config.Link.ImageUrl || ""} onChange={(e) => upLink({ ImageUrl: e.target.value })} placeholder="https://...image.png" /></>
              )}
              {field.Config.Link.ActionType === 2 && (
                <>
                  <Label text="Popup Başlık" /><input style={smInp} value={field.Config.Link.PopupTitle || ""} onChange={(e) => upLink({ PopupTitle: e.target.value })} />
                  <Label text="Popup İçerik" /><textarea style={{ ...smInp, minHeight: 50, resize: "vertical" }} value={field.Config.Link.PopupContent || ""} onChange={(e) => upLink({ PopupContent: e.target.value })} />
                </>
              )}
            </div>
          )}
        </Section>
        )}

        {/* ── Trailing Action ── */}
        {!isInfo && (
          <Section title="Sağ Aksiyon (Trailing)" defaultOpen={!!field.Config?.TrailingAction}>
            {!field.Config?.TrailingAction ? (
              <button style={{ background: "none", border: `1px dashed ${C.accent}60`, color: C.accent, padding: "5px 12px", borderRadius: 6, fontSize: 11, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }} onClick={() => upTrail({ Type: 1 })}>+ Aksiyon Ekle</button>
            ) : (
              <div style={{ background: C.bg, borderRadius: 6, padding: 10, border: `1px solid ${C.border}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                  <span style={{ fontSize: 11, fontWeight: 700, color: C.text2 }}>Trailing Action</span>
                  <button style={{ background: C.danger + "20", border: "none", color: C.danger, width: 22, height: 22, borderRadius: 4, cursor: "pointer", fontSize: 11 }} onClick={clearTrail}>✕</button>
                </div>
                <Label text="Tip" />
                <select style={smInp} value={field.Config.TrailingAction.Type ?? 0} onChange={(e) => upTrail({ Type: parseInt(e.target.value) })}>
                  {TRAILING_TYPES.map((t) => <option key={t.value} value={t.value}>{t.label}</option>)}
                </select>
                {field.Config.TrailingAction.Type === 2 && (
                  <><Label text="OCR Pattern" /><input style={smInp} value={field.Config.TrailingAction.Pattern || ""} onChange={(e) => upTrail({ Pattern: e.target.value })} placeholder="Regex" /></>
                )}
                <Label text="Arama Alanı (SearchField)" />
                <input style={smInp} value={field.Config.TrailingAction.SearchField || ""} onChange={(e) => upTrail({ SearchField: e.target.value || undefined })} placeholder="Opsiyonel" />
                {field.Config.TrailingAction.Type === 5 && (
                  <><Label text="Bilgi Mesajı" /><textarea style={{ ...smInp, minHeight: 50, resize: "vertical" }} value={field.Config.TrailingAction.InfoMessage || ""} onChange={(e) => upTrail({ InfoMessage: e.target.value })} /></>
                )}
              </div>
            )}
          </Section>
        )}

        {/* ── Bağımlılık ── */}
        <Section title="Bağımlılık" defaultOpen={!!field.DependsOn}>
          {others.length === 0 ? (
            <div style={{ color: C.text2, fontSize: 12, padding: 8 }}>Başka alan ekleyin</div>
          ) : (
            <>
              <Label text="Üst Alan" />
              <select style={inp} value={field.DependsOn?.FieldId || ""} onChange={(e) => setDep(e.target.value || null)}>
                <option value="">— Yok —</option>
                {others.map((f) => <option key={f.Id} value={f.Id}>{(f.Label || f.Id)} ({f.Id})</option>)}
              </select>
              {field.DependsOn?.FieldId && (
                <>
                  <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: C.text2, cursor: "pointer", marginTop: 8 }}>
                    <input type="checkbox" checked={!!field.DependsOn?.DefaultVisible} onChange={(e) => onUpdate(field.Id, { DependsOn: { ...field.DependsOn, DefaultVisible: e.target.checked } })} /> Varsayılan Görünür
                  </label>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 12, fontSize: 11, color: C.text2 }}>
                    <span style={{ fontWeight: 700 }}>Kurallar</span>
                    <button style={{ background: "none", border: `1px dashed ${C.accent}60`, color: C.accent, padding: "3px 10px", borderRadius: 6, fontSize: 10, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }} onClick={addDR}>+ Kural</button>
                  </div>
                  {Object.entries(field.DependsOn?.Rules || {}).map(([key, rule]) => (
                    <div key={key} style={{ background: C.bg, borderRadius: 6, padding: 10, marginTop: 6, border: `1px solid ${C.border}` }}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6, alignItems: "center" }}>
                        <input style={{ ...inp, maxWidth: 150 }} value={key} onChange={(e) => upDR(key, e.target.value, rule)} placeholder="Tetikleyici değer" />
                        <button style={{ background: C.danger + "20", border: "none", color: C.danger, width: 22, height: 22, borderRadius: 4, cursor: "pointer", fontSize: 11 }} onClick={() => rmDR(key)}>✕</button>
                      </div>
                      <div style={{ display: "flex", gap: 12, marginTop: 6, flexWrap: "wrap" }}>
                        {[["Visible", "Görünür"], ["Enabled", "Aktif"], ["Required", "Zorunlu"]].map(([p, l]) => (
                          <label key={p} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: C.text2, cursor: "pointer" }}>
                            <input type="checkbox" checked={p === "Required" ? !!rule[p] : p === "Enabled" ? rule[p] !== false : rule[p] !== false} onChange={(e) => upDR(key, key, { ...rule, [p]: e.target.checked })} /> {l}
                          </label>
                        ))}
                      </div>
                      <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                        <div style={{ flex: 1 }}><Label text="MinLength" /><input style={smInp} type="number" value={rule.MinLength ?? ""} onChange={(e) => upDR(key, key, { ...rule, MinLength: e.target.value ? parseInt(e.target.value) : undefined })} /></div>
                        <div style={{ flex: 1 }}><Label text="MaxLength" /><input style={smInp} type="number" value={rule.MaxLength ?? ""} onChange={(e) => upDR(key, key, { ...rule, MaxLength: e.target.value ? parseInt(e.target.value) : undefined })} /></div>
                      </div>
                      <Label text="Placeholder (Override)" />
                      <input style={smInp} value={rule.Placeholder || ""} onChange={(e) => upDR(key, key, { ...rule, Placeholder: e.target.value || undefined })} placeholder="Opsiyonel" />
                      <Label text="Klavye Tipi (Override)" />
                      <select style={smInp} value={rule.KeyboardType ?? ""} onChange={(e) => upDR(key, key, { ...rule, KeyboardType: e.target.value ? parseInt(e.target.value) : undefined })}>
                        <option value="">— Değiştirme —</option>
                        {KEYBOARD_TYPES.map((k) => <option key={k.value} value={k.value}>{k.label}</option>)}
                      </select>
                    </div>
                  ))}
                </>
              )}
            </>
          )}
        </Section>

        {/* ═══ LIVE PREVIEW ═══ */}
        <div style={{ marginTop: 16, marginBottom: 20 }}>
          <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, color: C.text2, marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ fontSize: 14 }}>📱</span> Mobil Önizleme — Yazarak Test Edin
          </div>
          <div style={{ background: "#f3f4f6", borderRadius: 16, padding: 16, border: `2px solid ${C.border}`, position: "relative", overflow: "hidden" }}>
            {/* Phone frame top */}
            <div style={{ textAlign: "center", marginBottom: 12 }}>
              <div style={{ display: "inline-block", width: 60, height: 4, borderRadius: 2, background: "#d1d5db" }} />
            </div>
            <FieldPreview field={field} />
            {/* Bottom bar */}
            <div style={{ display: "flex", justifyContent: "center", marginTop: 12 }}>
              <div style={{ width: 40, height: 4, borderRadius: 2, background: "#d1d5db" }} />
            </div>
          </div>
          {/* Validation rules summary */}
          {(field.Config?.ValidationRules?.length > 0 || field.Config?.MinLength || field.Config?.MaxLength || field.Config?.MinValue != null || field.Config?.MaxValue != null || field.Config?.Required || field.Config?.Link || field.Config?.TrailingAction || field.Config?.Errors) && (
            <div style={{ marginTop: 8, display: "flex", gap: 6, flexWrap: "wrap" }}>
              {field.Config?.Required && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: C.warning + "20", color: C.warning }}>Zorunlu</span>}
              {field.Config?.MinLength && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: C.blue + "20", color: C.blue }}>MinLen: {field.Config.MinLength}</span>}
              {field.Config?.MaxLength && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: C.blue + "20", color: C.blue }}>MaxLen: {field.Config.MaxLength}</span>}
              {field.Config?.MinValue != null && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: C.blue + "20", color: C.blue }}>MinVal: {field.Config.MinValue}</span>}
              {field.Config?.MaxValue != null && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: C.blue + "20", color: C.blue }}>MaxVal: {field.Config.MaxValue}</span>}
              {field.Config?.DefaultValue && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: C.success + "20", color: C.success }}>Default: {field.Config.DefaultValue}</span>}
              {field.Config?.Errors && Object.values(field.Config.Errors).some(v => v) && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: "#ef4444" + "20", color: "#ef4444" }}>⚠ Özel Hatalar</span>}
              {field.Config?.Link && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: "#8b5cf6" + "20", color: "#8b5cf6" }}>🔗 Link</span>}
              {field.Config?.TrailingAction && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: "#f97316" + "20", color: "#f97316" }}>⚡ {TRAILING_TYPES.find(t => t.value === field.Config.TrailingAction.Type)?.label || "Action"}</span>}
              {(field.Config?.ValidationRules || []).map((r, i) => (
                <span key={i} style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: C.accent2 + "20", color: C.accent2 }}>
                  {VALIDATION_TYPES.find(v => v.value === r.Type)?.label || "Regex"}{r.Pattern ? `: ${r.Pattern.substring(0, 20)}${r.Pattern.length > 20 ? "…" : ""}` : ""}
                </span>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
